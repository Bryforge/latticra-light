<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LATTICRA • LIGHT</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            font-family: 'VT323', monospace;
        }
        canvas {
            display: block;
        }
        .info {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 18px;
            pointer-events: none;
            text-shadow: 0 0 15px #ff00ff;
            z-index: 10;
            color: #fff;
        }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <div class="info">LATTICRA LIGHT • TRY ME</div>

<script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let t = 0;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    window.onresize = resize;
    resize();

    // Click anywhere to toggle fullscreen
    canvas.addEventListener('click', () => {
        if (!document.fullscreenElement) {
            canvas.requestFullscreen().catch(() => {});
        } else {
            document.exitFullscreen();
        }
    });

    ctx.font = '20px VT323';

    setInterval(() => {
        // Fade trail effect
        ctx.fillStyle = '#00000022';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Draw 999 swirling particles
        for (let i = 999; i >= 0; i--) {
            const hue = (i + t * 2) % 360;
            ctx.fillStyle = `hsl(${hue}, 100%, 65%)`;
            
            const x = canvas.width / 2 + Math.cos(i / 9 + t / 9) * (i / 1.8);
            const y = canvas.height / 2 + Math.sin(i / 7 + t / 7) * (i / 1.8);
            
            ctx.fillText(i & 1 ? '✦' : '0', x, y);
        }
        
        t++;
    }, 16);
</script>
</body>
</html>
