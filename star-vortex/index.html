<!doctype html>
<html>
<head>
  <title>Star Code Vortex</title>
</head>
<body>
<script>
document.body.style="margin:0;background:#000;overflow:hidden";
c=document.body.appendChild(document.createElement`canvas`);
g=c.getContext`2d`;
g.font="16px monospace";

onresize=()=>c.width=innerWidth,c.height=innerHeight;
onresize();

t=0;
setInterval(()=>{
  g.fillStyle="#0002";
  g.fillRect(0,0,c.width,c.height);

  for(i=999;i--;){
    g.fillStyle=`hsl(${i+t},100%,60%)`;
    g.fillText(
      i&1 ? "✦" : "0",
      c.width/2 + Math.cos(i+t/9)*i/2,
      c.height/2 + Math.sin(i+t/7)*i/2
    );
  }

  t++;
},16);
</script>
</body>
</html>
